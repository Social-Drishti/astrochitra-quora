<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ask AstroChitra On Quora — Vedic Astrology Answers</title>
<meta name="description" content="Ask your Vedic astrology questions on Quora. AstroChitra answers personally — 22+ years of experience, free for everyone.">
<meta name="keywords" content="AstroChitra, ask on Quora, Vedic astrology, astrology answers, Quora profile">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://quora.astrochitra.com">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="apple-touch-icon" href="assets/logo.svg">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="Ask AstroChitra On Quora — Vedic Astrology Answers">
<meta property="og:description" content="Ask your Vedic astrology questions on Quora. AstroChitra answers personally — 22+ years of wisdom, free for everyone.">
<meta property="og:image" content="https://quora.astrochitra.com/assets/og_image.png">
<meta property="og:image:alt" content="AstroChitra — Ask on Quora">
<meta property="og:url" content="https://quora.astrochitra.com">
<meta property="og:site_name" content="AstroChitra">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ask AstroChitra On Quora — Vedic Astrology Answers">
<meta name="twitter:description" content="Ask your Vedic astrology questions on Quora. AstroChitra answers personally — free for everyone.">
<meta name="twitter:image" content="https://quora.astrochitra.com/assets/og_image.png">

<!-- Schema.org JSON-LD -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Ask AstroChitra On Quora",
  "description": "Ask your Vedic astrology questions on Quora. AstroChitra answers personally — 22+ years of experience, free for everyone.",
  "url": "https://quora.astrochitra.com",
  "mainEntity": {
    "@type": "Person",
    "name": "AstroChitra",
    "jobTitle": "Vedic Astrology",
    "brand": {
      "@type": "Organization",
      "name": "AstroChitra"
    }
  },
  "potentialAction": {
    "@type": "CommunicateAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "https://quora.astrochitra.com"
    }
  }
}
</script>

<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stage">

    <!-- glow motif (sun/moon echo from logo) -->
    <div class="glow"></div>

    <!-- HEADER -->
    <header class="head">
      <img class="head__logo" src="assets/logo.svg" alt="AstroChitra">
      <h1 class="head__title">Ask AstroChitra<br>On Quora</h1>
    </header>

    <!-- STEP CARD -->
    <section class="panel" aria-label="How it works">

      <div class="frame">
        <div class="frame__notch"></div>
        <div class="frame__shots" id="shots">
          <img src="assets/image_1.png" alt="Tap Login on Quora" class="frame__img is-active" data-step="0">
          <img src="assets/image_2.png" alt="Continue with Google" class="frame__img" data-step="1">
          <img src="assets/image_3.png" alt="Tap Ask on AstroChitra profile" class="frame__img" data-step="2">
          <img src="assets/image_4.png" alt="Type your question and submit" class="frame__img" data-step="3">
        </div>
        <button class="frame__nav frame__nav--prev" id="prevBtn" aria-label="Previous step">&#8249;</button>
        <button class="frame__nav frame__nav--next" id="nextBtn" aria-label="Next step">&#8250;</button>
      </div>

      <div class="steptext">
        <span class="steptext__eyebrow" id="stepEyebrow">Step 1 of 4</span>
        <p class="steptext__title" id="stepTitle">Tap Login</p>
        <p class="steptext__body" id="stepBody">Open Quora and tap Login to get started.</p>
      </div>

      <div class="dots" id="dots">
        <button class="dot is-active" data-step="0" aria-label="Step 1"></button>
        <button class="dot" data-step="1" aria-label="Step 2"></button>
        <button class="dot" data-step="2" aria-label="Step 3"></button>
        <button class="dot" data-step="3" aria-label="Step 4"></button>
      </div>

    </section>

    <!-- CTA -->
    <footer class="cta">
      <a class="cta__btn" href="https://www.quora.com/profile/AstroChitra" target="_blank" rel="noopener">
        Open Quora &amp; Ask
        <span class="cta__arrow">&#8594;</span>
      </a>
      <p class="cta__note">New here? Tap <strong>Continue with Google</strong> — takes 10 seconds.</p>
    </footer>

  </div>

<script src="script.js"></script>
</body>
</html>
